<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Fact Checker</title>
  <style>
    body {
      width: 300px;
      min-height: 200px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      color: white;
    }
    
    .container {
      padding: 20px;
      text-align: center;
    }
    
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    h1 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 600;
    }
    
    .subtitle {
      margin: 0 0 20px 0;
      font-size: 14px;
      opacity: 0.9;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin: 16px 0;
      font-size: 13px;
    }
    
    .btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 8px;
    }
    
    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .footer {
      margin-top: 20px;
      font-size: 11px;
      opacity: 0.7;
    }
    
    .warning {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 10px;
      margin: 10px 0;
      font-size: 12px;
      border-left: 3px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🤖</div>
    <h1>AI Fact Checker</h1>
    <p class="subtitle">Powered by OpenAI</p>
    
    <div class="status" id="status">
      Click the AI button on news pages to analyze articles
    </div>
    
    <button class="btn" id="openSettings">⚙️ Settings</button>
    <button class="btn" id="openDashboard">📊 Dashboard</button>
    <button class="btn" id="helpBtn">❓ Help</button>
    
    <div class="warning" id="apiWarning" style="display: none;">
      ⚠️ OpenAI API key not configured. Please add your API key in the settings.
    </div>
    
    <div class="footer">
      Extension works on major news websites<br>
      Version 2.0
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
